<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Inicio')}"></head>
<body>
<div id="app">
  <aside th:replace="~{fragments/layout :: sidebar('inicio')}"></aside>
  <div class="main-wrapper">
    <header th:replace="~{fragments/layout :: topbar('Inicio','bi-house-fill')}"></header>
    <main class="main-content">
      <div th:replace="~{fragments/layout :: flash}"></div>

      <div class="page-title">
        <i class="bi bi-house-fill" style="color:var(--accent-cyan)"></i> Inicio
      </div>

      <!-- Stat cards -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(30,111,224,.15)">
              <i class="bi bi-boxes" style="color:var(--accent-blue)"></i>
            </div>
            <div class="stat-info"><p>Total Artículos</p><h3 th:text="${total}">0</h3></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(40,199,111,.15)">
              <i class="bi bi-check-circle" style="color:var(--accent-green)"></i>
            </div>
            <div class="stat-info"><p>En Stock</p><h3 th:text="${ok}" style="color:var(--accent-green)">0</h3></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(255,214,0,.12)">
              <i class="bi bi-exclamation-triangle" style="color:var(--accent-yellow)"></i>
            </div>
            <div class="stat-info"><p>Stock Bajo</p><h3 th:text="${bajo}" style="color:var(--accent-yellow)">0</h3></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(224,60,60,.12)">
              <i class="bi bi-x-circle" style="color:var(--accent-red)"></i>
            </div>
            <div class="stat-info"><p>Sin Stock</p><h3 th:text="${crit}" style="color:var(--accent-red)">0</h3></div>
          </div>
        </div>
      </div>

      <!-- Últimas entradas -->
      <div class="table-card">
        <div class="table-card-header">
          <div class="table-card-title">
            <i class="bi bi-clock-history" style="color:var(--accent-blue)"></i> Últimas entradas
          </div>
          <a th:href="@{/inventario}" class="btn-primary-custom">
            <i class="bi bi-arrow-right"></i> Ver todo
          </a>
        </div>
        <div class="table-responsive">
          <table class="inv-table">
            <thead>
              <tr><th>Código</th><th>Nombre</th><th>Categoría</th><th>Stock</th><th>Nivel</th><th>Ubicación</th></tr>
            </thead>
            <tbody>
              <tr th:each="a : ${ultimos}"
                  th:classappend="${a.estadoStock=='BAJO'}?'row-low':(${a.estadoStock=='CRITICO'}?'row-crit':'')">
                <td class="cell-code" th:text="${a.codigo}"></td>
                <td th:text="${a.nombre}"></td>
                <td><span th:class="'pill pill-'+${#strings.toLowerCase(#strings.substring(a.categoria,0,4))}"
                          th:text="${a.categoria}"></span></td>
                <td class="cell-stock" th:text="${a.stock}"></td>
                <td>
                  <div class="bar-wrap">
                    <div class="bar-bg">
                      <div class="bar-fill"
                           th:classappend="${a.estadoStock=='NORMAL'}?'fill-ok':(${a.estadoStock=='BAJO'}?'fill-low':'fill-crit')"
                           th:style="'width:'+${a.porcentajeStock}+'%'"></div>
                    </div>
                    <span class="bar-min" th:text="'/'+${a.stockMinimo}"></span>
                  </div>
                </td>
                <td class="cell-loc" th:text="${a.ubicacion}"></td>
              </tr>
              <tr th:if="${#lists.isEmpty(ultimos)}">
                <td colspan="6" class="cell-empty">Sin artículos registrados.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
