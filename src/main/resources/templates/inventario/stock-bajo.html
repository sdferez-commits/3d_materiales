<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Stock Bajo')}"></head>
<body>
<div id="app">
  <aside th:replace="~{fragments/layout :: sidebar('stock-bajo')}"></aside>
  <div class="main-wrapper">
    <header th:replace="~{fragments/layout :: topbar('Stock Bajo','bi-exclamation-triangle-fill')}"></header>
    <main class="main-content">

      <div class="page-title">
        <i class="bi bi-exclamation-triangle-fill" style="color:var(--accent-yellow)"></i> Stock Bajo
      </div>

      <!-- Sin stock -->
      <div class="section-head mb-2">
        <i class="bi bi-x-circle-fill" style="color:var(--accent-red)"></i>
        Sin Stock (<span th:text="${#lists.size(sinStock)}">0</span>)
      </div>
      <div th:if="${#lists.isEmpty(sinStock)}" style="color:var(--text-muted);font-size:.85rem;margin-bottom:1rem">
        <i class="bi bi-check-circle" style="color:var(--accent-green)"></i> No hay artículos sin stock.
      </div>
      <div th:each="a : ${sinStock}" class="alert-row">
        <div class="dot dot-r"></div>
        <div class="alert-info">
          <p><strong th:text="${a.nombre}"></strong> — Sin stock (mínimo: <span th:text="${a.stockMinimo}"></span>)</p>
          <small th:text="${a.codigo+' · '+a.categoria+' · '+a.ubicacion}"></small>
        </div>
        <div class="alert-qty" style="color:var(--accent-red)" th:text="${a.stock}"></div>
        <a th:href="@{/inventario}" class="btn-icon ms-2" title="Ir a inventario">
          <i class="bi bi-pencil-fill"></i>
        </a>
      </div>

      <!-- Stock bajo -->
      <div class="section-head mt-4 mb-2">
        <i class="bi bi-exclamation-triangle-fill" style="color:var(--accent-yellow)"></i>
        Stock Bajo (<span th:text="${#lists.size(stockBajo)}">0</span>)
      </div>
      <div th:if="${#lists.isEmpty(stockBajo)}" style="color:var(--text-muted);font-size:.85rem">
        <i class="bi bi-check-circle" style="color:var(--accent-green)"></i> No hay artículos con stock bajo.
      </div>
      <div th:each="a : ${stockBajo}" class="alert-row">
        <div class="dot dot-y"></div>
        <div class="alert-info">
          <p><strong th:text="${a.nombre}"></strong>
            — Stock: <span th:text="${a.stock}"></span> / Mínimo: <span th:text="${a.stockMinimo}"></span></p>
          <small th:text="${a.codigo+' · '+a.categoria+' · '+a.ubicacion}"></small>
        </div>
        <div class="alert-qty" style="color:var(--accent-yellow)" th:text="${a.stock}"></div>
        <a th:href="@{/inventario}" class="btn-icon ms-2" title="Ir a inventario">
          <i class="bi bi-pencil-fill"></i>
        </a>
      </div>

    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
