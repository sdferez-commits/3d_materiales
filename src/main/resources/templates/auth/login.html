<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="login-page">

<div class="login-box">
  <div class="login-icon"><i class="bi bi-box-seam-fill"></i></div>
  <h2>Bienvenido</h2>
  <p class="sub">Ingresa tus credenciales para continuar</p>

  <div th:if="${error}"  class="alert alert-danger  py-2 text-center" style="font-size:.82rem">
    <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
  </div>
  <div th:if="${logout}" class="alert alert-success py-2 text-center" style="font-size:.82rem">
    <i class="bi bi-check-circle me-1"></i><span th:text="${logout}"></span>
  </div>

  <form th:action="@{/auth/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="mb-3">
      <label class="field-label">Usuario</label>
      <input name="username" type="text" class="field-input" placeholder="admin" required autofocus/>
    </div>
    <div class="mb-1">
      <label class="field-label">Contraseña</label>
      <input name="password" type="password" class="field-input" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn-login">
      Ingresar &nbsp;<i class="bi bi-arrow-right-short"></i>
    </button>
  </form>

  <p class="login-hint">Usuarios: <strong>admin</strong> / <strong>bodega</strong></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
