<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- HEAD -->
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' — Inventario'">Inventario</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>

<!-- SIDEBAR -->
<aside th:fragment="sidebar(active)" class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-box-seam-fill"></i></div>
    <div class="brand-text">MENÚ PRINCIPAL<span>Sistema</span></div>
  </div>
  <nav class="sidebar-nav">
    <a th:href="@{/}"            th:classappend="${active=='inicio'}    ?'active'" class="nav-item">
      <i class="bi bi-house-fill"                style="color:#00c8ff"></i> Inicio
    </a>
    <a th:href="@{/inventario}"  th:classappend="${active=='inventario'}?'active'" class="nav-item">
      <i class="bi bi-boxes"                     style="color:#1e6fe0"></i> Inventario
    </a>
    <a th:href="@{/stock-bajo}"  th:classappend="${active=='stock-bajo'}?'active'" class="nav-item">
      <i class="bi bi-exclamation-triangle-fill"  style="color:#ffd600"></i> Stock Bajo
      <span th:if="${alertas != null and alertas > 0}"
            class="nav-badge visible" th:text="${alertas}"></span>
    </a>
    <a th:href="@{/hacer-inventario}" th:classappend="${active=='hacer-inv'}?'active'" class="nav-item">
      <i class="bi bi-clipboard2-plus"           style="color:#28c76f"></i> Hacer Inventario
    </a>
  </nav>
  <div class="sidebar-footer">
    <i class="bi bi-circle-fill" style="color:#28c76f;font-size:.45rem"></i> Sistema en línea
  </div>
</aside>

<!-- TOPBAR -->
<header th:fragment="topbar(titulo, icono)" class="topbar">
  <div class="topbar-title">
    <i th:class="'bi ' + ${icono}" style="color:var(--accent-cyan)"></i>
    <span th:text="${titulo}">Título</span>
  </div>
  <div class="topbar-right">
    <a th:href="@{/stock-bajo}" class="topbar-btn" title="Alertas">
      <i class="bi bi-bell-fill"></i>
    </a>
    <div class="user-chip dropdown">
      <div data-bs-toggle="dropdown">
        <div class="user-avatar">
          <span sec:authentication="name">AD</span>
        </div>
        <span sec:authentication="name">Admin</span>
        <i class="bi bi-chevron-down" style="font-size:.6rem"></i>
      </div>
      <ul class="dropdown-menu dropdown-menu-end dd-dark">
        <li>
          <form th:action="@{/auth/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="dropdown-item text-danger" type="submit">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
            </button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</header>

<!-- FLASH -->
<div th:fragment="flash">
  <div th:if="${msg}"
       th:classappend="'alert alert-'+${tipo}+' alert-dismissible fade show flash-msg'"
       role="alert">
    <i th:class="${tipo=='success'}?'bi bi-check-circle me-2':'bi bi-exclamation-circle me-2'"></i>
    <span th:text="${msg}"></span>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
  </div>
</div>

</html>
